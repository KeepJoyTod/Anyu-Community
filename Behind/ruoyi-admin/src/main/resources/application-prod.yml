logging:
  level:
    com.ruoyi: info
    org.springframework: warn

spring:
  devtools:
    restart:
      enabled: false
  datasource:
    druid:
      webStatFilter:
        enabled: false
      statViewServlet:
        enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

referer:
  enabled: true
