spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    druid:
      master:
        url: ${DB_URL:jdbc:mysql://localhost:3306/ry?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8}
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:123456}
      slave:
        enabled: ${DB_SLAVE_ENABLED:false}
        url: ${DB_SLAVE_URL:}
        username: ${DB_SLAVE_USERNAME:}
        password: ${DB_SLAVE_PASSWORD:}
      initialSize: 5
      minIdle: 10
      maxActive: 20
      maxWait: 60000
      connectTimeout: 30000
      socketTimeout: 60000
      timeBetweenEvictionRunsMillis: 60000
      minEvictableIdleTimeMillis: 300000
      maxEvictableIdleTimeMillis: 900000
      validationQuery: SELECT 1 FROM DUAL
      testWhileIdle: true
      testOnBorrow: false
      testOnReturn: false
      webStatFilter:
        enabled: false
      statViewServlet:
        enabled: false
        allow: ${DRUID_ALLOW_IPS:}
        url-pattern: /druid/*
        login-username: ${DRUID_USERNAME:}
        login-password: ${DRUID_PASSWORD:}
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
          merge-sql: true
        wall:
          config:
            multi-statement-allow: ${DRUID_WALL_MULTI_STATEMENT_ALLOW:false}
