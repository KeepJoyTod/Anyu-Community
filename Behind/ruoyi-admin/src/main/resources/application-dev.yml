logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

spring:
  devtools:
    restart:
      enabled: true
  datasource:
    druid:
      webStatFilter:
        enabled: true
      statViewServlet:
        enabled: ${DRUID_CONSOLE_ENABLED:false}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

token:
  secret: ${JWT_SECRET:dev-jwt-secret-change-me-2026}

referer:
  enabled: false
