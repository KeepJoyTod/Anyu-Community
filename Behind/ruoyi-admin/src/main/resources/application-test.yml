logging:
  level:
    com.ruoyi: info
    org.springframework: warn

spring:
  devtools:
    restart:
      enabled: false
  datasource:
    druid:
      webStatFilter:
        enabled: false
      statViewServlet:
        enabled: false

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

token:
  secret: ${JWT_SECRET:test-jwt-secret-change-me-2026}

referer:
  enabled: false
