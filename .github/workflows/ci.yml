name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend
        working-directory: Behind
        run: mvn -B -DskipTests package

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: Behind/ruoyi-ui/package-lock.json

      - name: Build admin ui
        working-directory: Behind/ruoyi-ui
        run: |
          npm ci
          npm run build:prod
